stages:          
  - test
  - deploy
  - destroy


variables:
  TF_VAR_vsphere_password: "$vsphere_password"
  TF_VAR_working_directory: "$working_directory"


before_script:
  - ls -la ${working_directory}
  - sudo yum update -y  
  - sudo yum install -y yum-utils
  - sudo yum-config-manager --add-repo https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo
  - sudo yum -y install terraform
  - terraform --version
  - terraform init


test-job:   
  stage: test    
  script:
    - terraform validate
    - terraform plan -out=check.tfplan
  artifacts:
    paths:
      - "check.tfplan"


deploy-job:   
  stage: deploy    
  script:
    - terraform apply -auto-approve "check.tfplan" 
  artifacts:
    paths:
      - "terraform.tfstate"
    

destroy-job:  
  stage: destroy
  script:
    - terraform destroy -auto-approve 
  when: manual  



