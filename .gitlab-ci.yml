stages:          
  - test
  - deploy

before_script:
  - sudo yum update -y  
  - sudo yum install -y curl unzip 
  - ls -la /usr/local/bin/
  - curl -fsSL https://releases.hashicorp.com/terraform/1.1.0/terraform_1.1.0_linux_amd64.zip -o /home/gitlab-runner/builds/zvN3A5z1/0/dualedu/2022-2023/sis/dmajoros/projekt/terraform.zip
  - sudo unzip -o /home/gitlab-runner/builds/zvN3A5z1/0/dualedu/2022-2023/sis/dmajoros/projekt/terraform.zip -d /usr/local/bin/
  - sudo chmod +x /usr/local/bin/terraform


test-job:   
  stage: test    
  script:
    - terraform init
    - terraform validate
    - terraform plan


deploy-job:   
  stage: deploy    
  script:
    - terraform init
    - terraform apply -auto-approve



