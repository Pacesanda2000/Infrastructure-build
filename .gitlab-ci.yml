stages:          
  - build
  - test
  - deploy

before_script:
  - sudo yum update -y  # Pro CentOS/RHEL
  - sudo yum install -y curl unzip  # Pro CentOS/RHEL
  #- apk update
  #- apk add curl unzip
  - ls -la /usr/local/bin/
  - curl -fsSL https://releases.hashicorp.com/terraform/1.1.0/terraform_1.1.0_linux_amd64.zip -o /home/gitlab-runner/builds/zvN3A5z1/0/dualedu/2022-2023/sis/dmajoros/projekt/terraform.zip
  - sudo unzip -o /home/gitlab-runner/builds/zvN3A5z1/0/dualedu/2022-2023/sis/dmajoros/projekt/terraform.zip -d /usr/local/bin/
  - sudo chmod +x /usr/local/bin/terraform



build-job:       
  stage: build
  script:
    - terraform init
    - terraform validate
    - terraform plan




test-job:   
  stage: test    
  script:
    - echo "ahoj!."


deploy-job:   
  stage: deploy    
  script:
    - terraform init
    - terraform apply -auto-approve




